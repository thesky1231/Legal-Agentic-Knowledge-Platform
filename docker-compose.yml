services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: Agentic Knowledge Platform
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-stub}
      MODEL_ENDPOINT_MODE: ${MODEL_ENDPOINT_MODE:-responses}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-https://api.openai.com}
      MODEL_API_KEY: ${MODEL_API_KEY:-}
      PRIMARY_MODEL_NAME: ${PRIMARY_MODEL_NAME:-gpt-4.1-mini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-hash}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.openai.com}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-text-embedding-3-small}
      VECTOR_STORE_BACKEND: ${VECTOR_STORE_BACKEND:-memory}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-knowledge_chunks}
      RUN_STORE_BACKEND: ${RUN_STORE_BACKEND:-sqlite}
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/agent_platform.db}
      API_AUTH_ENABLED: ${API_AUTH_ENABLED:-false}
      API_KEYS: ${API_KEYS:-demo-key}
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    volumes:
      - app_data:/app/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
  app_data:
