name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build source archives
        run: |
          mkdir -p dist
          git archive --format=tar.gz --output=dist/legal-agentic-knowledge-platform-${GITHUB_REF_NAME}.tar.gz HEAD
          git archive --format=zip --output=dist/legal-agentic-knowledge-platform-${GITHUB_REF_NAME}.zip HEAD

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
